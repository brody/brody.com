<!DOCTYPE html>
<html class="leading-tight text-gray-900 antialiased" lang="en">
  <head>
    {% include "partials/site-head.html" %}
  </head>
  <body
    class="flex h-full min-h-screen w-full flex-col bg-neutral-900 font-wotfard text-neutral-300 lg:relative lg:flex-row"
    data-env="{{ node.env }}"
    x-data="{ open: false }"
    x-init="() => { setTimeout(() => { open = true }, 1500); }"
  >
    {% include "partials/site-nav.html" %}

    <div class="flex flex-1 flex-col px-5 pt-12 pb-12 lg:px-8 lg:pt-32">
      <div class="mx-auto max-w-2xl">{% block content %}{% endblock %}</div>
    </div>

    {% include "partials/banner.html" %}

    <script type="module" src="/main.js"></script>
  </body>
</html>
